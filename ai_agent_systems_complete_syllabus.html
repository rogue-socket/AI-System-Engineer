<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Systems - Complete Syllabus</title>
  <style>
    :root {
      --font-sans: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f8fa;
      --color-background-tertiary: #eef1f5;
      --color-border-primary: #a5b4c3;
      --color-border-secondary: #d5dbe3;
      --color-border-tertiary: #e5e9ef;
      --color-text-primary: #17212b;
      --color-text-secondary: #3f4d5a;
      --color-text-tertiary: #6b7785;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-sans);
      background: #f4f6f8;
      color: var(--color-text-primary);
      padding: 0 16px 24px;
    }
    .wrap {
      padding: 16px 0;
      max-width: 680px;
      margin: 0 auto;
    }
    .search-bar {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .search-bar:focus {
      border-color: var(--color-border-primary);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .leg {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .layer {
      margin-bottom: 12px;
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
    }
    .layer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      background: var(--color-background-secondary);
    }
    .layer-header:hover {
      background: var(--color-background-tertiary);
    }
    .layer-num {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .layer-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary);
      flex: 1;
    }
    .layer-count {
      font-size: 12px;
      color: var(--color-text-tertiary);
    }
    .caret {
      font-size: 12px;
      color: var(--color-text-tertiary);
      transition: transform 0.2s;
    }
    .caret.open {
      transform: rotate(90deg);
    }
    .layer-body {
      display: none;
      padding: 12px 16px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .layer-body.open {
      display: flex;
    }
    .section {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 10px 12px;
      min-width: 160px;
      flex: 1;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .section:hover {
      border-color: var(--color-border-primary);
    }
    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .section-count {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .badge.new {
      background: #EAF3DE;
      color: #3B6D11;
    }
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .modal-bg.open {
      display: flex;
    }
    .modal {
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      width: 100%;
      max-width: 560px;
      padding: 24px;
      position: relative;
      border: 1px solid var(--color-border-secondary);
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--color-text-secondary);
    }
    .modal-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .modal-layer {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-bottom: 16px;
    }
    .topic-list {
      list-style: none;
    }
    .topic-list li {
      font-size: 13px;
      color: var(--color-text-secondary);
      padding: 4px 0;
      border-bottom: 1px solid var(--color-border-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topic-list li:last-child {
      border-bottom: none;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .gap-tag {
      font-size: 10px;
      color: #3B6D11;
      background: #EAF3DE;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: auto;
    }
    .hidden {
      display: none;
    }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .stat-label {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }
    @media (max-width: 640px) {
      .layer-header {
        flex-wrap: wrap;
      }
      .layer-count {
        width: 100%;
      }
      .section {
        min-width: 100%;
      }
      .modal {
        padding: 18px;
      }
    }
  </style>
</head>

    function render(d) {
      const layers = document.getElementById('layers');
      layers.innerHTML = '';
      d.forEach((layer, li) => {
        const el = document.createElement('div');
        el.className = 'layer';
        const totalTopics = layer.sections.reduce((a, s) => a + s.topics.length, 0);
        el.innerHTML = `
          <div class="layer-header" onclick="toggleLayer(${li})">
            <span class="layer-num" style="background:${layer.bg};color:${layer.color}">${layer.id}</span>
            <span class="layer-title">${layer.title}</span>
            <span class="layer-count">${layer.sections.length} sections · ${totalTopics} topics</span>
            <span class="caret" id="caret-${li}">▶</span>
          </div>
          <div class="layer-body" id="body-${li}">
            ${layer.sections.map((s, si) => {
              const newCount = s.topics.filter(t => t && t.isNew).length;
              return `<div class="section" onclick="openModal('${layer.title}', ${li}, ${si})" style="border-left:3px solid ${layer.color}">
                <div class="section-title">${s.title}${newCount ? `<span class="badge new">+${newCount} new</span>` : ''}</div>
                <div class="section-count">${s.topics.length} topics</div>
              </div>`;
            }).join('')}
          </div>`;
        layers.appendChild(el);
      });
    }

    function toggleLayer(i) {
      const body = document.getElementById('body-' + i);
      const caret = document.getElementById('caret-' + i);
      const open = body.classList.toggle('open');
      caret.classList.toggle('open', open);
    }

    function openModal(layerTitle, li, si) {
      const layer = data[li];
      const sec = layer.sections[si];
      document.getElementById('modal-title').textContent = sec.title;
      document.getElementById('modal-layer').textContent = 'Layer ' + layer.id + ': ' + layerTitle;
      const ul = document.getElementById('modal-topics');
      ul.innerHTML = sec.topics.map(t => {
        const text = t && t.isNew ? t.text : t;
        const isNew = t && t.isNew;
        return `<li><span class="dot" style="background:${layer.color}"></span>${text}${isNew ? '<span class="gap-tag">newly added</span>' : ''}</li>`;
      }).join('');
      document.getElementById('modal-bg').classList.add('open');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal-bg'))
        document.getElementById('modal-bg').classList.remove('open');
    }

    function filterTopics(q) {
      const v = q.toLowerCase();
      data.forEach((layer, li) => {
        let layerMatch = false;
        layer.sections.forEach((s, si) => {
          const titleMatch = s.title.toLowerCase().includes(v);
          const topicMatch = s.topics.some(t => (t && t.isNew ? t.text : t).toLowerCase().includes(v));
          const match = !v || titleMatch || topicMatch || layer.title.toLowerCase().includes(v);
          const el = document.querySelector(`#body-${li} .section:nth-child(${si + 1})`);
          if (el) el.classList.toggle('hidden', !match);
          if (match) layerMatch = true;
        });
        const layerEl = document.querySelector(`.layer:nth-child(${li + 1})`);
        if (layerEl) {
          layerEl.classList.toggle('hidden', !layerMatch);
          if (v && layerMatch) {
            document.getElementById('body-' + li).classList.add('open');
            document.getElementById('caret-' + li).classList.add('open');
          }
        }
      });
    }

    render(data);
    toggleLayer(0);
  </script>
</body>
</html>
