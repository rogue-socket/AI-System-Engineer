<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Systems — Syllabus</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="s">
  <div class="header-row">
    <div>
      <h1 class="page-title">AI System Engineering</h1>
      <div class="s-meta">
        <span id="meta-layers"></span><span class="dot"></span>
        <span id="meta-sections"></span><span class="dot"></span>
        <span id="meta-topics"></span><span class="dot"></span>
        <button class="s-export" id="export-button" type="button">Export .md</button>
      </div>
    </div>
    <div class="status-legend" id="status-legend"></div>
  </div>
  <input class="s-search" id="search" type="search" aria-label="Search layers, sections, topics, and prerequisites" placeholder="Search layers, sections, or topics...">
  <div id="root"></div>
</div>

<button class="scroll-top" id="scroll-top" type="button" aria-label="Scroll to top">↑</button>
<button class="s-collapse" id="collapse-button" type="button" aria-label="Collapse all layers">Collapse all</button>

<script src="syllabus.js"></script>
<script>
const { data, getStats, renderLayerTree, filterLayerTree, wireHashFocus, layersToMarkdown, downloadMarkdown, renderStatusLegend, subscribeToTopicStatusChanges, applyPageTheme, setAllLayersOpen } = window.Syllabus;

const root = document.getElementById('root');
const searchInput = document.getElementById('search');
const exportButton = document.getElementById('export-button');
const statusLegend = document.getElementById('status-legend');

function updateMeta(stats) {
  document.getElementById('meta-layers').textContent = `${stats.layers} layers`;
  document.getElementById('meta-sections').textContent = `${stats.sections} sections`;
  document.getElementById('meta-topics').textContent = `${stats.topics} topics`;
}

function exportMarkdown() {
  const stats = getStats(data);
  const markdown = layersToMarkdown('AI Agent Systems — Syllabus', data, [
    `${stats.layers} layers · ${stats.sections} sections · ${stats.topics} topics`
  ]);
  downloadMarkdown('ai_agent_systems_syllabus.md', markdown);
}

function refreshStatusLegend() {
  renderStatusLegend(statusLegend, {
    noteText: 'Classification colors come from the layer taxonomy. Status colors are personal progress markers saved in your browser.'
  });
}

applyPageTheme({ color: '#111111', bg: '#F3F4F6' });
renderLayerTree(root, data, { anchorIds: true });
updateMeta(getStats(data));
wireHashFocus();
refreshStatusLegend();
subscribeToTopicStatusChanges(refreshStatusLegend);

const collapseButton = document.getElementById('collapse-button');
let allCollapsed = true;
setAllLayersOpen(root, false);
collapseButton.textContent = 'Expand all';

searchInput.addEventListener('input', event => {
  filterLayerTree(root, event.target.value);
});

exportButton.addEventListener('click', exportMarkdown);

collapseButton.addEventListener('click', () => {
  allCollapsed = !allCollapsed;
  setAllLayersOpen(root, !allCollapsed);
  collapseButton.textContent = allCollapsed ? 'Expand all' : 'Collapse all';
});

const scrollTopBtn = document.getElementById('scroll-top');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
  collapseButton.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });
scrollTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
