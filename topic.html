<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Detail — AI Agent Systems</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="topic-page">

<div class="s">
  <div class="page-topbar">
    <a class="back-link" id="back-link" href="index.html">Back to syllabus</a>
  </div>

  <div class="hero" id="hero">
    <div class="crumbs" id="breadcrumbs"></div>
    <div class="hero-k">Topic Detail</div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-summary" id="hero-summary"></p>
    <div class="topic-brief" id="topic-brief"></div>
    <div id="topic-status-picker"></div>
    <div class="hero-grid" id="hero-grid"></div>
  </div>

  <div class="s-meta" id="meta-bar">
    <span id="meta-layers"></span><span class="dot"></span>
    <span id="meta-sections"></span><span class="dot"></span>
    <span id="meta-topics"></span><span class="dot"></span>
    <button class="s-collapse" id="collapse-button" type="button">Expand all</button>
    <button class="s-export" id="export-button" type="button">Export .md</button>
  </div>

  <div class="status-legend" id="status-legend"></div>
  <input class="s-search" id="search" type="search" aria-label="Search this topic breakdown" placeholder="Search this topic breakdown...">
  <div class="resource-tools" id="resource-tools" hidden>
    <div class="resource-tools-label">Add your own links</div>
    <form class="resource-form" id="resource-form">
      <label class="resource-field">
        <span class="resource-field-label">Label</span>
        <input class="resource-input" id="resource-label" type="text" maxlength="120" placeholder="Short title for the link">
      </label>
      <label class="resource-field">
        <span class="resource-field-label">URL</span>
        <input class="resource-input" id="resource-url" type="text" inputmode="url" placeholder="https://example.com/resource">
      </label>
      <button class="s-collapse" type="submit">Add link</button>
    </form>
    <div class="resource-saved-note">Saved in this browser for this topic.</div>
    <div class="resource-saved-list" id="resource-saved-list"></div>
  </div>
  <div id="root"></div>
</div>

<button class="scroll-top" id="scroll-top" type="button" aria-label="Scroll to top">↑</button>

<script src="topic-briefs.js"></script>
<script src="js/data/syllabus-content.js"></script>
<script src="js/core/syllabus-core.js"></script>
<script src="js/features/topic-detail-shared.js"></script>
<script src="js/features/topic-brief.js"></script>
<script src="js/features/topic-prompt.js"></script>
<script src="js/features/topic-resources.js"></script>
<script src="js/features/topic-detail.js"></script>
<script src="syllabus.js"></script>
<script src="js/pages/topic-page.js"></script>
</body>
</html>
